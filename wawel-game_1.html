// ── INPUT ────────────────────────────────────────────────────────────
const TI={l:0,r:0,j:0,s:0};
function bindBtn(id,k){
  const el=document.getElementById(id);
  const on=e=>{e.preventDefault();TI[k]=1;el.classList.add('on')};
  const off=e=>{e.preventDefault();TI[k]=0;el.classList.remove('on')};
  el.addEventListener('touchstart',on,{passive:false});
  el.addEventListener('mousedown',e=>{initAudio();on(e)});
  ['touchend','touchcancel','mouseup','mouseleave'].forEach(ev=>el.addEventListener(ev,off));
}
bindBtn('bl','l');bindBtn('br','r');bindBtn('bj','j');bindBtn('bs','s');
document.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});
const KS={};
window.addEventListener('keydown',e=>{
  initAudio();
  if(e.key==='m'||e.key==='M'){
    if(musicOn){stopMusic();}else{musicOn=true;musicScheduled=false;startMusic();}
  }
  KS[e.key]=1;if([' ','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key))e.preventDefault()
});
window.addEventListener('keyup',e=>KS[e.key]=0);
const goL=()=>KS.ArrowLeft||KS.a||KS.A||TI.l;
const goR=()=>KS.ArrowRight||KS.d||KS.D||TI.r;

// ── AUDIO ENGINE — chiptune / Atari style ────────────────────────────
let AC=null,musicOn=true;
function initAudio(){
  if(AC)return;
  try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){AC=null;}
}
function beep(freq,dur,vol,type,when){
  if(!AC||!musicOn)return;
  const g=AC.createGain(),o=AC.createOscillator();
  o.type=type||'square';o.frequency.setValueAtTime(freq,when||AC.currentTime);
  g.gain.setValueAtTime((vol||0.08),when||AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001,(when||AC.currentTime)+dur);
  o.connect(g);g.connect(AC.destination);
  o.start(when||AC.currentTime);o.stop((when||AC.currentTime)+dur+0.01);
}
// Looping chiptune — classic Atari/NES flavour, 2-bar melody
const MELODY=[
  [330,.12],[392,.12],[440,.12],[523,.12],[440,.12],[392,.12],
  [330,.18],[0,.06],
  [294,.12],[349,.12],[392,.12],[494,.12],[392,.12],[349,.12],
  [294,.18],[0,.1],
  [392,.1],[440,.1],[523,.1],[587,.1],[523,.1],[440,.1],
  [392,.18],[0,.06],
  [330,.12],[392,.14],[440,.22],[0,.08]
];
const BASS=[
  [110,.22],[0,.02],[110,.1],[0,.12],[147,.22],[0,.02],[147,.1],[0,.12],
  [110,.22],[0,.02],[123,.1],[0,.12],[98,.36],[0,.08],
  [147,.22],[0,.02],[147,.1],[0,.12],[165,.22],[0,.02],[165,.1],[0,.12],
  [110,.36],[0,.08]
];
let musicScheduled=false,musicLoopId=null;
function scheduleMusic(when){
  if(!AC||!musicOn)return;
  let t=when;
  // melody
  MELODY.forEach(([f,d])=>{if(f>0)beep(f,d*0.85,0.055,'square',t);t+=d;});
  // bass — offset slightly
  let tb=when;
  BASS.forEach(([f,d])=>{if(f>0)beep(f,d*0.8,0.04,'sawtooth',tb);tb+=d;});
  // total loop duration
  const loopDur=MELODY.reduce((s,[,d])=>s+d,0);
  return loopDur;
}
function startMusic(){
  if(!AC||musicScheduled)return;
  musicScheduled=true;
  let next=AC.currentTime+0.05;
  function tick(){
    if(!musicOn){musicScheduled=false;return;}
    const dur=scheduleMusic(next);
    next+=dur;
    musicLoopId=setTimeout(tick,(dur-0.3)*1000);
  }
  tick();
}
function stopMusic(){
  musicOn=false;musicScheduled=false;
  if(musicLoopId)clearTimeout(musicLoopId);
}

function sfxSword(){beep(660,.04,.09,'square');setTimeout(()=>beep(880,.05,.07,'square'),30);setTimeout(()=>beep(1100,.04,.05,'square'),55);}

function sfxWin(){

  notes.forEach((f,i)=>{setTimeout(()=>beep(f,.25,.1,'square'),i*160);});

// ── PLAYER ───────────────────────────────────────────────────────────
let P={};
function resetP(cp,fullBossReset){
  const sx=cp===3?CP3+30:cp===2?CP2+30:cp===1?CP1+30:50;
  P={x:sx,y:GY-36,w:22,h:32,vx:0,vy:0,ground:false,face:1,dead:false,dt:0,inv:cp===3?90:0};
  const killed=ENE.filter(e=>!e.a).map(e=>e.id);
  ENE=mkEnemies();ENE.forEach(e=>{if(killed.includes(e.id))e.a=0});
  if(cp===3){
    const prevDeaths=fullBossReset?0:BOSS.totalDeaths;
    const prevConsec=fullBossReset?0:BOSS.consecHits;
    const prevDeathFR=fullBossReset?0:BOSS.lastDeathFR;
    BOSS=makeBoss();BOSS.bossActive=true;
    BOSS.totalDeaths=prevDeaths;
    BOSS.consecHits=prevConsec;
    BOSS.lastDeathFR=prevDeathFR;
  }
  CAM=Math.max(0,sx-CW*.35);
  swordTimer=0;swordCooldown=0;
}
resetP(0);

// ── BOSS DRAW ────────────────────────────────────────────────────────
function drawBoss(){
  if(!BOSS.bossActive&&!BOSS.dead)return;
  if(BOSS.dead)return;
  const B=BOSS;
  const bx=B.x-CAM,by=B.y;
  const W=B.w,H=B.h;
  const fl=B.flash>0;
  const bob=Math.sin(FR*.09)*6;
  const ph=B.phase;

  cx.save();

  // shadow
  cx.globalAlpha=.4;cx.fillStyle='#000';cx.beginPath();cx.ellipse(bx+W/2,GY+10,W/2+5,10,0,0,Math.PI*2);cx.fill();cx.globalAlpha=1;

  // body blob — yellowy-green like the cartoon
  const bodyBase=fl?'#ffffff':ph===3?'#88bb22':ph===2?'#99cc22':'#aad428';
  const bodyDark=fl?'#dddddd':ph===3?'#669900':ph===2?'#77aa00':'#88bb00';

  // lower body / tail mass
  cx.fillStyle=bodyDark;
  cx.beginPath();cx.ellipse(bx+W/2,by+H*.78+bob,W/2+12,H*.28,0,0,Math.PI*2);cx.fill();
  // main body
  cx.fillStyle=bodyBase;
  cx.beginPath();cx.ellipse(bx+W/2,by+H*.52+bob,W/2,H*.42,0,0,Math.PI*2);cx.fill();
  // upper chest
  cx.beginPath();cx.ellipse(bx+W/2,by+H*.3+bob,W/2-4,H*.22,0,0,Math.PI*2);cx.fill();

  // LEFT CLAW — reaches toward player
  const clawSide=P.x>B.x+W/2?1:-1;
  cx.fillStyle=bodyBase;
  cx.save();cx.translate(bx+W/2+clawSide*(W/2+2),by+H*.5+bob);cx.rotate(clawSide*(-.3+Math.sin(FR*.1)*.15));
  cx.beginPath();cx.ellipse(0,0,26,15,0,0,Math.PI*2);cx.fill();
  cx.fillStyle=bodyDark;
  for(let f=0;f<3;f++){cx.save();cx.rotate((f-1)*.35);cx.fillRect(clawSide>0?20:-36,-4,18,8);cx.restore();}
  cx.restore();

  // RIGHT CLAW — other side, slightly smaller
  cx.fillStyle=bodyBase;
  cx.save();cx.translate(bx+W/2-clawSide*(W/2+2),by+H*.65+bob);cx.rotate(-clawSide*.25+Math.sin(FR*.13)*.12);
  cx.beginPath();cx.ellipse(0,0,20,12,0,0,Math.PI*2);cx.fill();
  cx.fillStyle=bodyDark;
  for(let f=0;f<3;f++){cx.save();cx.rotate((f-1)*.3);cx.fillRect(-clawSide>0?16:-32,-3,16,6);cx.restore();}
  cx.restore();

  // ── HEAD 1: CENTER BACK — sheik with white turban (tallest) ──
  const h1x=bx+W/2,h1y=by+bob-8;
  cx.fillStyle=fl?'#fff':bodyBase;
  cx.beginPath();cx.ellipse(h1x,h1y,28,24,0,0,Math.PI*2);cx.fill();
  // white turban
  cx.fillStyle=fl?'#eee':'#f2f2f2';
  cx.beginPath();cx.ellipse(h1x,h1y-16,26,12,0,0,Math.PI,true);cx.fill();
  cx.beginPath();cx.ellipse(h1x,h1y-19,30,9,0,0,Math.PI*2);cx.fill();
  // white beard
  cx.fillStyle=fl?'#ddd':'#eeeeee';
  cx.beginPath();cx.ellipse(h1x,h1y+16,11,9,0,0,Math.PI*2);cx.fill();
  // angry brows
  cx.strokeStyle=fl?'#aaa':'#225500';cx.lineWidth=2.5;
  cx.beginPath();cx.moveTo(h1x-14,h1y-10);cx.lineTo(h1x-6,h1y-14);cx.stroke();
  cx.beginPath();cx.moveTo(h1x+14,h1y-10);cx.lineTo(h1x+6,h1y-14);cx.stroke();
  // red eyes
  cx.fillStyle='#dd1100';cx.beginPath();cx.ellipse(h1x-9,h1y-7,6,7,.2,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.ellipse(h1x+9,h1y-7,6,7,-.2,0,Math.PI*2);cx.fill();
  cx.fillStyle='#000';cx.beginPath();cx.arc(h1x-9,h1y-7,2.5,0,Math.PI*2);cx.fill();cx.beginPath();cx.arc(h1x+9,h1y-7,2.5,0,Math.PI*2);cx.fill();
  // fangs
  cx.fillStyle='#ffffcc';
  [[h1x-9,h1y+7],[h1x,h1y+8],[h1x+9,h1y+7]].forEach(([fx,fy])=>{cx.beginPath();cx.moveTo(fx-3,fy);cx.lineTo(fx,fy+9);cx.lineTo(fx+3,fy);cx.closePath();cx.fill();});
  // roar mouth glow
  if(B.roar>0){cx.globalAlpha=B.roar/35*.7;cx.fillStyle='#ff4400';cx.beginPath();cx.ellipse(h1x,h1y+8,13,9,0,0,Math.PI*2);cx.fill();cx.globalAlpha=1;}

  // ── HEAD 2: LEFT — kalpak cap, angrier ──

  cx.beginPath();cx.ellipse(h2x,h2y,21,19,-.1,0,Math.PI*2);cx.fill();
  // fez/kalpak
  cx.fillStyle=fl?'#bbb':ph>=2?'#cc3300':'#993300';
  cx.beginPath();cx.ellipse(h2x,h2y-13,19,9,.05,0,Math.PI,true);cx.fill();
  cx.fillRect(h2x-19,h2y-17,38,6);
  cx.fillStyle=fl?'#ddd':'#f0c040';cx.fillRect(h2x-19,h2y-12,38,4);
  // brows
  cx.strokeStyle=fl?'#aaa':'#224400';cx.lineWidth=2;
  cx.beginPath();cx.moveTo(h2x-12,h2y-8);cx.lineTo(h2x-5,h2y-11);cx.stroke();
  cx.beginPath();cx.moveTo(h2x+12,h2y-8);cx.lineTo(h2x+5,h2y-11);cx.stroke();
  // eyes
  cx.fillStyle='#ee3300';cx.beginPath();cx.ellipse(h2x-7,h2y-5,5,6,.1,0,Math.PI*2);cx.fill();cx.beginPath();cx.ellipse(h2x+7,h2y-5,5,6,-.1,0,Math.PI*2);cx.fill();
  cx.fillStyle='#000';cx.beginPath();cx.arc(h2x-7,h2y-5,2,0,Math.PI*2);cx.fill();cx.beginPath();cx.arc(h2x+7,h2y-5,2,0,Math.PI*2);cx.fill();
  // fangs
  cx.fillStyle='#ffffcc';[[h2x-6,h2y+6],[h2x+6,h2y+6]].forEach(([fx,fy])=>{cx.beginPath();cx.moveTo(fx-2.5,fy);cx.lineTo(fx,fy+7);cx.lineTo(fx+2.5,fy);cx.closePath();cx.fill();});

  // ── HEAD 3: RIGHT — no hat, most demonic, open screaming ──
  const h3x=bx+W-14,h3y=by+bob-22;
  cx.fillStyle=fl?'#fff':ph>=3?'#77aa11':'#99cc22';
  cx.beginPath();cx.ellipse(h3x,h3y,21,19,.1,0,Math.PI*2);cx.fill();
  // vein lines on forehead
  cx.strokeStyle=fl?'#aaa':'#558800';cx.lineWidth=1.2;
  cx.beginPath();cx.moveTo(h3x-8,h3y-13);cx.bezierCurveTo(h3x-4,h3y-9,h3x+4,h3y-9,h3x+8,h3y-13);cx.stroke();
  cx.beginPath();cx.moveTo(h3x-5,h3y-15);cx.lineTo(h3x-2,h3y-9);cx.stroke();
  // rage brows
  cx.strokeStyle=fl?'#aaa':'#224400';cx.lineWidth=2.5;
  cx.beginPath();cx.moveTo(h3x-13,h3y-8);cx.lineTo(h3x-4,h3y-12);cx.stroke();
  cx.beginPath();cx.moveTo(h3x+13,h3y-8);cx.lineTo(h3x+4,h3y-12);cx.stroke();
  // screaming eyes
  cx.fillStyle='#ff0000';cx.beginPath();cx.ellipse(h3x-7,h3y-5,6,7,-.1,0,Math.PI*2);cx.fill();cx.beginPath();cx.ellipse(h3x+7,h3y-5,6,7,.1,0,Math.PI*2);cx.fill();
  cx.fillStyle='#000';cx.beginPath();cx.arc(h3x-7,h3y-4,2.5,0,Math.PI*2);cx.fill();cx.beginPath();cx.arc(h3x+7,h3y-4,2.5,0,Math.PI*2);cx.fill();
  // wide open screaming mouth
  cx.fillStyle='#110000';cx.beginPath();cx.ellipse(h3x,h3y+9,10,9,0,0,Math.PI*2);cx.fill();
  cx.fillStyle='#ffffcc';[[h3x-7,h3y+5],[h3x-2,h3y+6],[h3x+3,h3y+6],[h3x+8,h3y+5]].forEach(([fx,fy])=>{cx.beginPath();cx.moveTo(fx-2,fy);cx.lineTo(fx,fy+7);cx.lineTo(fx+2,fy);cx.closePath();cx.fill();});

  // ── HP BAR ──
  const bpw=220,bph=14,bpx=(CW-bpw)/2,bpy=32;
  cx.fillStyle='#00000099';cx.fillRect(bpx-3,bpy-3,bpw+6,bph+6);
  cx.fillStyle='#440000';cx.fillRect(bpx,bpy,bpw,bph);
  const hpf=B.hp/B.maxhp;
  cx.fillStyle=hpf>.66?'#55ff55':hpf>.33?'#f0c040':'#ff3300';
  cx.fillRect(bpx,bpy,bpw*hpf,bph);

  cx.fillStyle='#fff';cx.font='bold 9px Georgia';cx.textAlign='center';
  cx.fillText('MONSTER OF STAGNATION  '+Math.ceil(B.hp)+'/'+B.maxhp,CW/2,bpy+11);

  cx.textAlign='left';
  cx.restore();

  // ── SWORD READY INDICATOR (boss active) ──
  const rdy=swordCooldown<=0&&swordTimer<=0;
  cx.fillStyle='#00000077';cx.fillRect(8,32,85,11);
  cx.fillStyle=rdy?'#44ff88':'#f0c040';

  cx.fillStyle='#fff';cx.font='8px Georgia';cx.textAlign='left';

// ── SWORD DRAW ───────────────────────────────────────────────────────
function drawSword(){
  if(swordTimer<=0)return;
  const prog=swordTimer/SWORD_FRAMES;
  const sx=P.x-CAM+P.w/2,sy=P.y+P.h/2-4;
  // arc from high-back to forward-low
  const angStart=P.face>0?-1.1:Math.PI+1.1;
  const angEnd  =P.face>0? 0.5:Math.PI-0.5;
  const ang=angStart+(angEnd-angStart)*(1-prog);
  cx.save();cx.translate(sx,sy);cx.rotate(ang);
  // glow
  cx.globalAlpha=prog*.5;
  cx.strokeStyle='#aaddff';cx.lineWidth=SWORD_RANGE;cx.lineCap='round';
  cx.beginPath();cx.moveTo(6,0);cx.lineTo(6+SWORD_RANGE*.5,0);cx.stroke();
  cx.globalAlpha=1;
  // blade
  cx.fillStyle='#ddeeff';cx.fillRect(6,-3,SWORD_RANGE,6);
  // shine
  cx.fillStyle='rgba(255,255,255,.75)';cx.fillRect(6,-1.5,SWORD_RANGE*.7,2);
  // tip
  cx.fillStyle='#eef4ff';cx.beginPath();cx.moveTo(6+SWORD_RANGE,0);cx.lineTo(6+SWORD_RANGE+12,-3);cx.lineTo(6+SWORD_RANGE+12,3);cx.closePath();cx.fill();
  // crossguard
  cx.fillStyle='#cc8822';cx.fillRect(3,-10,5,20);cx.fillStyle='#ffaa33';cx.fillRect(4,-9,3,18);
  // handle
  cx.fillStyle='#774400';cx.fillRect(-8,-3,12,6);cx.fillStyle='#995500';cx.fillRect(-7,-2,10,4);
  cx.restore();
}

  cx.fillStyle='#e09060';cx.beginPath();cx.ellipse(6,-12,6,4,.2,0,Math.PI*2);cx.fill();
  cx.fillStyle='#442200';cx.beginPath();cx.ellipse(-2,-7,7,3.5,0,0,Math.PI*2);cx.fill();
  cx.fillStyle='#fff';cx.beginPath();cx.ellipse(-4,-17,3.5,4,0,0,Math.PI*2);cx.fill();cx.beginPath();cx.ellipse(4,-17,3.5,4,0,0,Math.PI*2);cx.fill();
  cx.fillStyle='#111';cx.beginPath();cx.arc(-3,-17,1.8,0,Math.PI*2);cx.fill();cx.beginPath();cx.arc(5,-17,1.8,0,Math.PI*2);cx.fill();
  cx.fillStyle='#cc2222';cx.fillRect(-14,-27,28,9);cx.fillRect(-10,-41,20,16);
  cx.fillStyle='#ffffffdd';cx.font='bold 10px Georgia';cx.textAlign='center';cx.fillText('M',0,-29);cx.textAlign='left';
  cx.restore();
}

// ── TRUMP / BIDEN DRAW ───────────────────────────────────────────────
function drawTrump(e){
  const sx=e.x-CAM;if(sx>CW+60||sx+e.w<-60)return;
  cx.save();cx.translate(sx+e.w/2,e.y+e.h/2);if(e.vx>0)cx.scale(-1,1);
  const spd=Math.abs(e.vx),bob=Math.sin(FR*.18+e.id*1.3)*(1+spd*.8);cx.translate(0,bob);

// ── UPDATE BOSS ──────────────────────────────────────────────────────
function updateBoss(){
  if(!BOSS.bossActive||BOSS.dead)return;
  const B=BOSS;
  if(B.flash>0)B.flash--;
  if(B.roar>0)B.roar--;

  // Phase transitions based on HP
  const hpf=B.hp/B.maxhp;
  if(hpf<.33&&B.phase<3){B.phase=3;say("The monster is nearly dead and absolutely furious about it.",true);}
  else if(hpf<.66&&B.phase<2){B.phase=2;say("The monster is hurt. It is moving faster now. Of course it is.",true);}

  // Normal movement — bounce in arena (slower so player can land hits)
  const spd=(B.phase===3?1.1:B.phase===2?0.85:0.6)*(B.lunge>0?3.0:1);
  B.x+=(B.vx>0?spd:-spd);
  if(B.x<3870){B.x=3870;B.vx=Math.abs(B.vx);}
  if(B.x+B.w>4185){B.x=4185-B.w;B.vx=-Math.abs(B.vx);}

  // Lunge toward player (less frequent — gives time to strike)
  B.lungeTimer++;
  const lungeEvery=B.phase===3?100:B.phase===2?150:200;
  if(B.lunge<=0&&B.lungeTimer>lungeEvery){
    B.lunge=18;B.lungeTimer=0;B.roar=28;
    B.vx=P.x<B.x+B.w/2?-Math.abs(B.vx):Math.abs(B.vx);
  }
  if(B.lunge>0)B.lunge--;

  // Boss touches player — give Mariusz inv frames so he can retreat
  if(!P.dead&&P.inv<=0){
    if(P.x<B.x+B.w&&P.x+P.w>B.x&&P.y<B.y+B.h&&P.y+P.h>B.y){
      // Track consecutive rapid deaths (within ~10s of each other)
      if(FR-B.lastDeathFR<BOSS_CONSEC_WINDOW){B.consecHits++;}else{B.consecHits=1;}
      B.lastDeathFR=FR;
      B.totalDeaths++;
      const consecMsg=B.consecHits>=BOSS_CONSEC_LIMIT
        ?["Brave. Stupid. Brave-stupid. "+B.consecHits+" deaths in a row. The monster is embarrassed for you.",
          "You keep coming back immediately. It keeps killing you immediately. Notice the pattern."][Math.floor(Math.random()*2)]
        :["A plumber with a sword. Still dying. Inspiring, really.",
          "The monster yawns. Please try harder.",
          "Three heads, and still you find a way to walk into all of them.",
          "Classic Mariusz. Classic."][Math.floor(Math.random()*4)];
      P.dead=true;P.dt=0;swordTimer=0;swordCooldown=0;sfxHit();
      pfx(P.x+P.w/2,P.y+P.h/2,'#cc2222',14);
      say(consecMsg,true);
      gstate='dead';
      if(B.consecHits>=BOSS_CONSEC_LIMIT||B.totalDeaths>=BOSS_DEATH_LIMIT){P.dt=999;}
    }
  }
  // Remove proximity-based consecHits reset — now time-based above

  // Sword hits boss — only when player alive, once per swing (tracked by swingID)
  if(!P.dead&&swordTimer>2&&swordTimer<=SWORD_FRAMES-1){
    const sx1=P.face>0?P.x+P.w:P.x-SWORD_RANGE;
    const sx2=P.face>0?P.x+P.w+SWORD_RANGE:P.x;
    if(!B._hitThisSwing&&sx1<B.x+B.w&&sx2>B.x&&P.y<B.y+B.h&&P.y+P.h>B.y){
      B._hitThisSwing=true;
      B.hp=Math.max(0,B.hp-1);
      B.flash=14;sfxBossHit();
      pfx(B.x+B.w/2,B.y+B.h*.35,'#ffcc44',10);
      pfx(B.x+B.w/2,B.y+B.h*.35,'#ffffff',4);
      if(B.hp<=0){
        B.dead=true;B.bossActive=false;
        pfx(B.x+B.w/2,B.y+B.h/2,'#f0c040',40);pfx(B.x+B.w/2,B.y+B.h/2,'#ff8800',40);pfx(B.x+B.w/2,B.y+B.h/2,'#ffffff',20);
        sfxWin();
        gstate='win';say("The monster is dead. You are a plumber. This should not have worked.",true);
      }
    }
  }
  // Reset hit flag when sword is idle (not swinging)
  if(swordTimer<=0){B._hitThisSwing=false;}
}

// ── UPDATE PLAYER ────────────────────────────────────────────────────
function updatePlayer(){
  if(P.dead){
    P.dt++;
    if(P.dt>90){
      if(BOSS.bossActive&&BOSS.totalDeaths>=BOSS_DEATH_LIMIT){gstate='bossfail';return;}
      resetP(lastCP,false);gstate='playing';jumpHeld=false;swordHeld=false;
    }
    return;
  }
  if(P.inv>0)P.inv--;
  const spd=3.2;
  if(goL()){P.vx=-spd;P.face=-1}else if(goR()){P.vx=spd;P.face=1}else P.vx*=.72;
  const jNow=goJ();if(jNow&&!jumpHeld&&P.ground){P.vy=-9.8;P.ground=false;sfxJump();}jumpHeld=jNow;
  P.vy=Math.min(P.vy+.5,16);P.x+=P.vx;P.y+=P.vy;P.ground=false;
  PLATS.forEach(pl=>{
    if(!olap(P,pl))return;
    const ox=Math.min(P.x+P.w,pl.x+pl.w)-Math.max(P.x,pl.x),oy=Math.min(P.y+P.h,pl.y+pl.h)-Math.max(P.y,pl.y);
    if(oy<ox){if(P.y<pl.y){P.y=pl.y-P.h;P.vy=0;P.ground=true}else{P.y=pl.y+pl.h;P.vy=Math.abs(P.vy)*.15}}
    else{P.x=P.x<pl.x?pl.x-P.w:pl.x+pl.w;P.vx=0}
  });
  P.x=Math.max(0,P.x);if(P.x>LW-P.w)P.x=LW-P.w;
  if(P.y>CH+60){
    P.dead=true;P.dt=0;swordTimer=0;swordCooldown=0;
    pfx(P.x+P.w/2,GY+10,'#cc2222');
    gstate='dead';
    if(BOSS.bossActive){
      BOSS.totalDeaths++;
      if(FR-BOSS.lastDeathFR<BOSS_CONSEC_WINDOW){BOSS.consecHits++;}else{BOSS.consecHits=1;}
      BOSS.lastDeathFR=FR;
      say("Into the Vistula. The dragon lives down there. It is not pleased.",true);
      if(BOSS.consecHits>=BOSS_CONSEC_LIMIT||BOSS.totalDeaths>=BOSS_DEATH_LIMIT){P.dt=999;}
    } else {
      say("Fell into the Vistula. The dragon watched. Did not help. Has standards.",true);
    }
  }

  // Sword attack — holding Z/⚔ auto-repeats at cooldown rate
  if(swordCooldown>0)swordCooldown--;
  if(swordTimer>0)swordTimer--;
  if(goS()&&swordCooldown<=0&&swordTimer<=0&&BOSS.bossActive){
    swordTimer=SWORD_FRAMES;swordCooldown=SWORD_CD+SWORD_FRAMES;sfxSword();
  }
  swordHeld=goS();

  // Checkpoints
  if(!cp1&&P.x>=CP1){cp1=true;lastCP=1;pfx(P.x+P.w/2,P.y,'#f0c040',8);say("Checkpoint 1. Trump is fast now. You were told. Do not act surprised.",true)}
  if(!cp2&&P.x>=CP2){cp2=true;lastCP=2;pfx(P.x+P.w/2,P.y,'#44aaff',8);say("Checkpoint 2. He claims he built this castle. Nobody checked. Nobody wanted to.",true)}
  if(!cp3&&P.x>=CP3){cp3=true;lastCP=3;pfx(P.x+P.w/2,P.y,'#ff8800',8);say("Checkpoint 3. The Monster awaits. It has been waiting calmly. Unlike you.",true)}

  // Boss trigger
  if(!BOSS.bossActive&&!BOSS.dead&&P.x>=BOSS_TRIGGER){
    BOSS.bossActive=true;
    say("Ah. The Monster of Stagnation. Three heads. Zero patience. Good luck, plumber.",true);
  }

  if(P.inv>0)return;

  // Enemy collisions (only when not in boss fight)
  if(!BOSS.bossActive){
    ENE.forEach(e=>{
      if(!e.a||!olap(P,e))return;
      const stomp=P.vy>1&&(P.y+P.h)<(e.y+e.h*.58);
      const airKill=!P.ground&&!stomp;
      if(stomp||airKill){
        e.a=0;pfx(e.x+e.w/2,e.y,e.t==='T'?'#ff8800':'#aaddff');pfx(e.x+e.w/2,e.y+e.h/2,'#fff',6);
        if(stomp)P.vy=-8.5;else P.vy=Math.max(P.vy,2);
        sfxKill();
        if(e.t==='T'){const ph=tPhrase(e.x);say([`Shouting "${ph}" all the way down. Tremendous fall.`,`Last post: "${ph}". Nobody liked it.`,`Tiny hands. Could not hold on. Sad.`,`"${ph}" — his final, most coherent statement.`][Math.floor(Math.random()*4)],true);}
        else{say(["The ice cream survived. He did not. Priorities.","Aviators intact. Dignity: complicated.","Still smiling on the way down. Muscle memory.","The ZZZs continue, technically, from below.","Someone will write a very long memoir about this."][Math.floor(Math.random()*5)],true);}
      } else {
        P.dead=true;P.dt=0;P.inv=0;gstate='dead';pfx(P.x+P.w/2,P.y+P.h/2,'#cc2222');sfxHit();
        say(e.t==='T'
          ?["You walked into him. He was barely moving. Impressive in the worst way.","He did not move. You did. In the wrong direction.","You had the high ground. Briefly."][Math.floor(Math.random()*3)]
          :["Biden got you. He did not notice. Nobody did.","The slowest enemy on the level. And yet.","He was practically asleep. You were slower. Remarkable."][Math.floor(Math.random()*3)],true);
      }
    });
  }
  const tc=P.x-CW*.35;CAM+=(tc-CAM)*.13;CAM=Math.max(0,Math.min(CAM,LW-CW));
}

  cx.fillStyle='rgba(150,0,0,'+(.18+.07*Math.sin(FR*.2))+')';cx.fillRect(0,0,CW,CH);
  cx.textAlign='center';cx.fillStyle='#ff4444';cx.font='bold 24px Georgia';cx.fillText('OH DEAR',350,CH/2-26);
  cx.font='italic 13px Georgia';cx.fillStyle='#ffaaaa';cx.fillText(lastCP?'Respawning at Checkpoint '+lastCP+'...':'Returning to start...',350,CH/2+4);
  if(BOSS.bossActive){
    const rem=BOSS_DEATH_LIMIT-BOSS.totalDeaths;
    cx.font='11px Georgia';cx.fillStyle=rem<=3?'#ff4422':'#ff8866';
    cx.fillText('Boss deaths: '+BOSS.totalDeaths+'/'+BOSS_DEATH_LIMIT+' — '+rem+' lives left before full restart',350,CH/2+28);
    if(BOSS.consecHits>=2){
      cx.fillStyle='#ff6622';cx.font='bold 11px Georgia';
      cx.fillText('Rapid death streak: '+BOSS.consecHits+'. The monster finds this amusing.',350,CH/2+48);
    }
  } else {
    cx.font='11px Georgia';cx.fillStyle='#ff8866';cx.fillText('Enemies already killed stay dead. Small mercies.',350,CH/2+28);
  }
  cx.textAlign='left';
}
function drawBossFail(){
  drawBG();drawDragons();
  cx.fillStyle='#000000cc';cx.fillRect(0,0,CW,CH);
  cx.textAlign='center';
  // Red flash border
  cx.strokeStyle='#ff2200';cx.lineWidth=6;cx.strokeRect(6,6,CW-12,CH-12);
  cx.fillStyle='#ff3300';cx.font='bold 28px Georgia';cx.fillText('THE MONSTER DEFEATED YOU',350,80);
  cx.fillStyle='#ffaa44';cx.font='bold 13px Georgia';cx.fillText(BOSS_DEATH_LIMIT+' deaths. The monster is tired of winning against you.',350,114);
  cx.fillStyle='#ffffff88';cx.fillRect(80,130,540,2);
  cx.fillStyle='#ffe0aa';cx.font='italic 13px Georgia';
  cx.fillText('"Mariusz. You died '+BOSS_DEATH_LIMIT+' times. The record was four."',350,160);
  cx.fillText('"The monster did not train for this. It did not need to."',350,182);
  cx.fillText('"You have a sword. It is quite long. Please use it from a distance."',350,204);
  cx.fillText('"The dragon took notes. It will not share them."',350,226);
  cx.fillStyle='#ffffff88';cx.fillRect(80,250,540,2);
  cx.fillStyle='#aaddff';cx.font='12px Georgia';cx.fillText('STRATEGY: approach → slash → retreat immediately',350,274);
  cx.fillStyle='#ffcc44';cx.font='11px Georgia';cx.fillText('4 consecutive touches = instant death  |  Use Z / ⚔ when in range',350,294);
  cx.globalAlpha=.65+.35*Math.sin(FR*.1);
  cx.fillStyle='#f0c040';cx.font='bold 16px Georgia';cx.fillText('SPACE or ⬆ — try the boss again',350,336);
  cx.globalAlpha=1;cx.textAlign='left';
}
function drawWin(){
  drawBG();drawDragons();drawPlats();
  // Gold glow border
  cx.shadowColor='#f0c040';cx.shadowBlur=22;
  cx.strokeStyle='#f0c040';cx.lineWidth=4;cx.strokeRect(30,14,640,354);
  cx.shadowBlur=0;
  cx.fillStyle='#000000cc';cx.fillRect(30,14,640,354);
  cx.textAlign='center';

  // Title
  cx.fillStyle='#f0c040';cx.font='bold 22px Georgia';cx.fillText('\u2605  THE UNNECESSARY QUEST: COMPLETE  \u2605',350,52);
  cx.fillStyle='#ff8844';cx.font='bold 12px Georgia';cx.fillText('The Monster of Stagnation: VANQUISHED',350,74);

  // Stats
  const kl=ENE.filter(e=>!e.a).length;
  cx.fillStyle='#aaddff';cx.font='11px Georgia';
  cx.fillText('Enemies defeated: '+kl+'/'+TOTAL+'   |   Boss deaths used: '+BOSS.totalDeaths+'/'+BOSS_DEATH_LIMIT,350,94);

  // Divider
  cx.fillStyle='#f0c04055';cx.fillRect(60,106,580,1);

  // Final message box
  cx.fillStyle='#0d0520cc';cx.fillRect(50,114,600,180);
  cx.strokeStyle='#f0c04066';cx.lineWidth=1;cx.strokeRect(50,114,600,180);

  cx.fillStyle='#ffcc44';cx.font='bold 13px Georgia';cx.fillText('A final message from Wawel Castle, Krakow:',350,136);

  cx.fillStyle='#ffe8cc';cx.font='italic 12px Georgia';
  cx.fillText('"Mariusz. You fought like a knight. A genuine, medieval, fearless knight."',350,158);
  cx.fillText('"You crossed Wawel in the dark and slew a three-headed monster."',350,178);
  cx.fillText('"You did everything right. Brave. Persistent. Surprisingly competent."',350,198);
  cx.fillStyle='#ffaa44';cx.font='bold 12px Georgia';
  cx.fillText('"Unfortunately. This is the Instagram age."',350,220);
  cx.fillStyle='#ff7744';cx.font='bold 13px Georgia';
  cx.fillText('"She already left. With a guy who has a Porsche and 40k followers."',350,242);
  cx.fillStyle='#ffe8cc';cx.font='italic 12px Georgia';
  cx.fillText('"He did not fight any monsters. He posted a story from Mykonos."',350,264);
  cx.fillText('"The dragon sympathises. The castle does not. It has seen this before."',350,282);

  // Divider
  cx.fillStyle='#f0c04044';cx.fillRect(60,308,580,1);

  // Next stage tease
  cx.fillStyle='#88cc88';cx.font='italic 11px Georgia';cx.fillText('Stage 2: Brussels awaits. The bureaucracy never ends. She is probably there too.',350,324);

  // Pulsing restart hint
  cx.globalAlpha=.55+.45*Math.sin(FR*.08);
  cx.fillStyle='#aaaadd';cx.font='11px Georgia';cx.fillText('Press SPACE or \u2B06 to play again',350,344);
  cx.globalAlpha=1;

  // Share prompt box
  cx.fillStyle='#f0c04022';cx.fillRect(80,350,540,24);
  cx.strokeStyle='#f0c04055';cx.lineWidth=1;cx.strokeRect(80,350,540,24);
  cx.fillStyle='#f0c040';cx.font='bold 11px Georgia';
  cx.fillText('\uD83D\uDCE4  If you enjoyed this — share the link. Leave a comment. Tell us what you thought.',350,366);
  cx.textAlign='left';
}

// ── MAIN LOOP ────────────────────────────────────────────────────────
function loop(){
  FR++;cx.clearRect(0,0,CW,CH);
  if(gstate==='title'){
    drawTitle();if(goJ()||KS.Enter){initAudio();musicOn=true;startMusic();gstate='playing';say(IDLE[0],true);jumpHeld=true;}
  } else if(gstate==='playing'){
    drawBG();drawDragons();drawPlats();drawCPs();drawFlag();
    if(!BOSS.bossActive&&!BOSS.dead)ENE.forEach(e=>e.t==='T'?drawTrump(e):drawBiden(e));
    drawPlayer();drawSword();drawBoss();drawFX();drawHUD();
    updatePlayer();
    if(!BOSS.bossActive&&!BOSS.dead)updateEnemies();
    updateBoss();
    if(++nT>300){nT=0;nI=(nI+1)%IDLE.length;say(IDLE[nI]);}
  } else if(gstate==='dead'){
    drawBG();drawDragons();drawPlats();drawCPs();drawFlag();
    if(!BOSS.bossActive&&!BOSS.dead)ENE.forEach(e=>e.t==='T'?drawTrump(e):drawBiden(e));
    drawPlayer();drawSword();drawBoss();drawFX();drawHUD();drawDeath();
    updatePlayer();
  } else if(gstate==='bossfail'){
    drawBG();drawDragons();
    drawBossFail();
    // Any jump/space/enter restarts boss stage fresh
    if(goJ()||KS.Enter){
      cp3=true;lastCP=3;
      resetP(3,true);  // full boss reset — totalDeaths back to 0
      gstate='playing';jumpHeld=true;swordHeld=false;
      say("The monster has been reset. So have you. Try not to walk into it this time.",true);
    }
  } else if(gstate==='win'){
    drawWin();
    // Allow restart
    if(goJ()||KS.Enter){
      // Full game reset
      cp1=false;cp2=false;cp3=false;lastCP=0;nT=0;nI=0;
      BOSS=makeBoss();ENE=mkEnemies();parts=[];
      stopMusic();musicOn=true;musicScheduled=false;
      resetP(0,true);gstate='title';jumpHeld=true;
    }
  }
  requestAnimationFrame(loop);
}
loop();
</script>
